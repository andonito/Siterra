<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Siterra | Premium Websites for Service Businesses</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="description" content="Siterra builds premium, conversion-focused websites for local service businesses, contractors, and professionals who want to look trusted, modern, and ready to grow." />
    <!-- Inline cobalt tech crown / geometric S monogram favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'%3E%3Crect width='100' height='100' rx='24' fill='%2305070A'/%3E%3Ccircle cx='50' cy='50' r='35' stroke='%231F2A37' stroke-width='2'/%3E%3Cpath d='M35 65C35 55 42 48 50 48C58 48 65 42 65 35' stroke='%232563FF' stroke-width='6' stroke-linecap='round'/%3E%3Cpath d='M35 35C35 45 42 52 50 52C58 52 65 58 65 65' stroke='%23FFFFFF' stroke-width='6' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%232563FF'/%3E%3C/svg%3E" />
  </head>
  <body class="bg-[#05070A] text-white antialiased">
    <!-- Static hidden form for Netlify automated form discovery & registration -->
    <form name="lead-inquiry" netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="text" name="businessName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="url" name="website" />
      <input type="text" name="websiteType" />
      <input type="text" name="budget" />
      <input type="text" name="message" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
